# =============================================================================
# Docker Compose — Fraud Detection Pipeline
# =============================================================================
# Tüm altyapı servisleri tek komutla başlatılır:
#   docker-compose up -d
#
# Servisler:
#   - Kafka + Zookeeper  : Mesaj kuyruğu
#   - Neo4j              : Graf veritabanı (fraud ring analizi)
#   - Prometheus          : Metrik toplama
#   - Grafana             : Dashboard görselleştirme
#
# Producer ve Consumer Python uygulamaları ayrı çalışır:
#   python -m producer.producer --tps 100
#   python -m consumer.consumer
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # Apache Kafka Ekosistemi
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka topic'lerini otomatik oluştur
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Kafka topic''leri oluşturuluyor...'

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic raw-transactions \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic fraud-results \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic drift-alerts \
        --partitions 1 \
        --replication-factor 1

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic analyst-feedback \
        --partitions 1 \
        --replication-factor 1

      echo 'Topic''ler oluşturuldu:'
      kafka-topics --list --bootstrap-server kafka:9092
      "

  # ---------------------------------------------------------------------------
  # Neo4j Graph Database
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.15-community
    container_name: fraud-neo4j
    ports:
      - "7474:7474" # HTTP (browser)
      - "7687:7687" # Bolt (driver)
    environment:
      NEO4J_AUTH: neo4j/fraud-detection-2024
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Prometheus (Metrik Toplama)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ---------------------------------------------------------------------------
  # Grafana (Dashboard)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: fraud-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fraud2024
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fraud.json
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  neo4j_data:
  neo4j_logs:
  grafana_data:
